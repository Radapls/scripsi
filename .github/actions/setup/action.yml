name: '🪶 Scripsi CI'
description: 'Setup Node + pnpm environment for Scripsi'
branding:
  icon: 'italic'
  color: 'purple'

runs:
  using: 'composite'
  steps:
    - name: 🪶 Setup pnpm
      uses: pnpm/action-setup@v4

    - name: 🪶 Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: 🪶 Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: 🪶 Configure git
      shell: bash
      run: |
        git config --global user.email "ci@scripsi.dev"
        git config --global user.name "Scripsi CI"

    - name: 🪶 Summary
      shell: bash
      run: |
        NODE_VER=$(node -v)
        PNPM_VER=$(pnpm -v)
        cat >> $GITHUB_STEP_SUMMARY <<EOF
        ## 🪶 Scripsi CI

        | Tool | Version |
        |------|---------|
        | Node | \`${NODE_VER}\` |
        | pnpm | \`${PNPM_VER}\` |
        | OS | \`${{ runner.os }}\` |

        ---
        EOF
